spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agroinvest_db}?stringtype=unspecified
    username: ${DB_USERNAME:agroinvest_user}
    password: ${DB_PASSWORD:strong_password_here}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_password_here}
      timeout: 2000ms

jwt:
  secret: ${JWT_SECRET:your_super_secret_jwt_key_minimum_32_chars_for_agroinvest_project!}

encryption:
  key: ${ENCRYPTION_KEY:32_char_aes256_key_must_be_here!}

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${S3_ACCESS_KEY:minio_access}
  secret-key: ${S3_SECRET_KEY:minio_secret}
  bucket: ${S3_BUCKET_NAME:agroinvest}
  public-url: ${S3_PUBLIC_URL:http://localhost:9000/agroinvest}

payme:
  merchant-id: ${PAYME_MERCHANT_ID:}
  secret-key: ${PAYME_SECRET_KEY:}
  test-secret-key: ${PAYME_TEST_SECRET_KEY:}
  test-mode: ${PAYME_TEST_MODE:true}

click:
  merchant-id: ${CLICK_MERCHANT_ID:}
  service-id: ${CLICK_SERVICE_ID:}
  secret-key: ${CLICK_SECRET_KEY:}

sms:
  base-url: ${SMS_BASE_URL:https://notify.eskiz.uz}
  email: ${SMS_EMAIL:}
  password: ${SMS_PASSWORD:}
  from: ${SMS_FROM:4546}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: dev
