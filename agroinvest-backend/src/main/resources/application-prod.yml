spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?stringtype=unspecified
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms

# No fallback defaults on purpose: a missing secret in production should fail the
# app at startup, not silently fall back to a known/weak value (see the dev profile's
# defaults, which exist purely for local convenience).
jwt:
  secret: ${JWT_SECRET}

encryption:
  key: ${ENCRYPTION_KEY}

s3:
  endpoint: ${S3_ENDPOINT}
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}
  bucket: ${S3_BUCKET_NAME}
  public-url: ${S3_PUBLIC_URL}

payme:
  merchant-id: ${PAYME_MERCHANT_ID}
  secret-key: ${PAYME_SECRET_KEY}
  test-secret-key: ${PAYME_TEST_SECRET_KEY:}
  test-mode: ${PAYME_TEST_MODE:false}

click:
  merchant-id: ${CLICK_MERCHANT_ID}
  service-id: ${CLICK_SERVICE_ID}
  secret-key: ${CLICK_SECRET_KEY}

sms:
  base-url: ${SMS_BASE_URL:https://notify.eskiz.uz}
  email: ${SMS_EMAIL:}
  password: ${SMS_PASSWORD:}
  from: ${SMS_FROM:4546}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: prod

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

# Swagger/OpenAPI is only wired up as permitAll in SecurityConfig for developer
# convenience - disable the endpoints entirely in prod rather than relying on that
# permitAll list never growing to expose something it shouldn't.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
