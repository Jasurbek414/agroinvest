server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: agroinvest-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

jwt:
  access-expiry-seconds: 900 # 15 minutes
  refresh-expiry-seconds: 2592000 # 30 days

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html
