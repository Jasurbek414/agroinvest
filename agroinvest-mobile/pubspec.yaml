name: agroinvest_mobile
description: AgroInvest — Farmer and Investor Connection Platform
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.7.0
  http_parser: ^4.0.2

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Declarative routing (named routes, deep-linking, auth redirects)
  go_router: ^14.2.7

  # Image picker (for reports / KYC)
  image_picker: ^1.1.2

  # File picker
  file_picker: ^8.1.2

  # Geolocation
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Network Image caching
  cached_network_image: ^3.4.1

  # Graphs & Charts
  fl_chart: ^0.69.0

  # Shimmer skeleton loading
  shimmer: ^3.0.0

  # Toast messages
  fluttertoast: ^8.2.8

  # Dotenv configuration
  flutter_dotenv: ^5.2.1

  # Date/number formatting
  intl: ^0.19.0

  # Internet connectivity
  connectivity_plus: ^6.0.5

  # Animations
  lottie: ^3.1.2

  # OTP pin field widget
  pin_code_fields: ^8.0.1

  # Cupertino icons
  cupertino_icons: ^1.0.8

  # Push notifications - infrastructure only until a real Firebase project +
  # google-services.json/GoogleService-Info.plist are added (see
  # core/notifications/push_notification_service.dart for the activation note).
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # In-app checkout WebView for Payme/Click - infrastructure only until real
  # merchant credentials are configured (see payment_webview_page.dart).
  # Pinned to 4.7.x (not the newest 4.10+) - this repo's Dart SDK floor
  # (>=3.3.0) is older than what later webview_flutter releases require.
  webview_flutter: ^4.7.0
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/translations/
